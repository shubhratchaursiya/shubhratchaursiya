<svg width="800" height="280" viewBox="0 0 800 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #080E18; stroke: #00F2FE; stroke-width: 1.5; rx: 16px; }
    .header { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 18px; fill: #00F2FE; }
    .subtext { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 12px; fill: #6B7C96; }
    .stat-label { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 13px; fill: #8B9BB4; font-weight: 500; }
    .stat-value { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 14px; fill: #00F2FE; font-weight: 700; }
    .stat-value-pink { fill: #FF5376; }
    .stat-value-yellow { fill: #FFCB6B; }
    
    /* Graph Blocks */
    .c-0 { fill: #101A28; rx: 2px; }
    .c-1 { fill: #004D61; rx: 2px; }
    .c-2 { fill: #008CA8; rx: 2px; }
    .c-3 { fill: #00D8F6; rx: 2px; }
    .c-4 { fill: #00F2FE; rx: 2px; filter: drop-shadow(0px 0px 2px #00F2FE); }
    .c-pink { fill: #FF5376; rx: 2px; filter: drop-shadow(0px 0px 2px #FF5376); }
