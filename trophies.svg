<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <style>
    .bg { fill: #1a0b2e; stroke: #ff66b2; stroke-width: 2; rx: 10; }
    .title { fill: #fff; font-family: sans-serif; font-size: 16px; font-weight: bold; }
    .trophy { font-size: 40px; animation: pop 0.5s ease-out backwards; }
    @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
  </style>
  <rect width="400" height="150" class="bg" />
  <text x="20" y="30" class="title">🏆 GitHub Trophies</text>
  <text x="40" y="90" class="trophy" style="animation-delay: 0.2s">🏆</text>
  <text x="120" y="90" class="trophy" style="animation-delay: 0.4s">🌟</text>
  <text x="200" y="90" class="trophy" style="animation-delay: 0.6s">💻</text>
  <text x="280" y="90" class="trophy" style="animation-delay: 0.8s">🔥</text>
</svg>
