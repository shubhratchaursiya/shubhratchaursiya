<!-- ================= CARD 1 ================= -->
<g class="cell" style="animation-delay:0.30s">
  <rect x="12" y="12" width="168" height="144" rx="14" fill="#170e28" stroke="#2496ED" stroke-opacity=".65" stroke-width="1.3"/>
  <text x="96" y="52" text-anchor="middle" font-size="30">⚙️</text>
  <text class="rk" x="164" y="40" text-anchor="end" font-size="24" font-weight="bold" fill="#2496ED">SSS</text>
  <text x="96" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">DevOps Engineer</text>
  <text x="96" y="112" text-anchor="middle" font-size="11" fill="#9aa4b2">Docker • Kubernetes • CI/CD</text>
  <rect x="30" y="124" width="132" height="5" rx="2.5" fill="#241740"/>
  <rect x="30" y="124" width="0" height="5" rx="2.5" fill="#2496ED">
    <animate attributeName="width" from="0" to="132" dur="1s" begin=".60s" fill="freeze"/>
  </rect>
</g>

