<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff66b2" />
      <stop offset="100%" stop-color="#9933ff" />
    </linearGradient>
    <style>
      .bg { fill: #0d0d2b; stroke: #9933ff; stroke-width: 2; rx: 15px; }
      .title { fill: #ff66b2; font-family: sans-serif; font-size: 18px; font-weight: bold; }
      .label { fill: #ffffff; font-family: sans-serif; font-size: 14px; opacity: 0; animation: slideIn 0.8s forwards; }
      .value { fill: #ff66b2; font-family: monospace; font-size: 14px; font-weight: bold; }
      .rank-text { fill: #ffffff; font-family: sans-serif; font-size: 22px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
      
      @keyframes slideIn {
        from { transform: translateX(-15px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      
      @keyframes spinRing {
        from { stroke-dashoffset: 283; }
        to { stroke-dashoffset: 70; }
      }
      
      .ring-circle {
        stroke: url(#ringGrad);
        stroke-width: 8;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 283;
        stroke-dashoffset: 283;
        animation: spinRing 1.5s ease-out forwards;
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect width="450" height="200" class="bg" rx="15" />

  <!-- Title -->
  <text x="25" y="35" class="title">⚡ Shubhrat's GitHub Stats</text>

  <!-- Animated Rank Ring -->
  <g transform="translate(360, 110)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#2a2a5a" stroke-width="8" />
    <circle cx="0" cy="0" r="45" class="ring-circle" transform="rotate(-90)" />
    <text x="0" y="2" class="rank-text">A+</text>
  </g>

  <!-- Stat Rows Sliding In -->
  <g class="label" style="animation-delay: 0.2s;" transform="translate(25, 75)">
    <text x="0" y="0">Total Stars Earned:</text>
    <text x="170" y="0" class="value">150</text>
  </g>

  <g class="label" style="animation-delay: 0.4s;" transform="translate(25, 105)">
    <text x="0" y="0">Total Commits:</text>
    <text x="170" y="0" class="value">1,024</text>
  </g>

  <g class="label" style="animation-delay: 0.6s;" transform="translate(25, 135)">
    <text x="0" y="0">Total PRs:</text>
    <text x="170" y="0" class="value">42</text>
  </g>

  <g class="label" style="animation-delay: 0.8s;" transform="translate(25, 165)">
    <text x="0" y="0">Total Issues:</text>
    <text x="170" y="0" class="value">15</text>
  </g>
</svg>
