<svg width="800" height="380" viewBox="0 0 800 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080E18" />
      <stop offset="100%" stop-color="#02050A" />
    </linearGradient>

    <!-- Metallic 3D Button Gradient -->
    <linearGradient id="btn-3d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E2D42" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070C14" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="btn-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    .bg-card { fill: url(#bg-grad); stroke: #00F2FE; stroke-width: 1.5; rx: 16px; }
    .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 20px; fill: #00F2FE; }
    .subtitle { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 13px; fill: #6B7C96; }
    
    /* Interactive Button Styling */
    .btn-group { cursor: pointer; transition: transform 0.2s ease, filter 0.2s ease; }
    .btn-group:hover { transform: translateY(-3px); }
    
    .btn-base { fill: url(#btn-3d); stroke: #1A293D; stroke-width: 1.5; rx: 10px; filter: url(#btn-shadow); }
    .btn-group:hover .btn-base { stroke: #00F2FE; }
    
    .btn-text { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 14px; fill: #FFFFFF; }
    .btn-subtext { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 11px; fill: #00F2FE; }
    
    /* Hover Glow Accents */
    .btn-group:hover .btn-icon { filter: url(#cyan-glow); }
  </style>

  <!-- Background Card -->
  <rect width="798" height="378" x="1" y="1" class="bg-card" rx="16" />

  <!-- Header -->
  <text x="40" y="45" class="title">⚡ Connect With Me</text>
  <text x="40" y="68" class="subtitle">Select any platform below to reach out or explore my work.</text>
  <line x1="40" y1="85" x2="760" y2="85" stroke="#1A2A3A" stroke-width="1" />

  <!-- BUTTON 1: LinkedIn -->
  <a href="https://www.linkedin.com/in/shubhrat-chaursiya-819672354/" target="_blank">
    <g class="btn-group" transform="translate(40, 105)">
      <rect width="340" height="65" class="btn-base" rx="12"/>
      <!-- LinkedIn Icon Container -->
      <rect x="12" y="12" width="41" height="41" rx="8" fill="#0A66C2" />
      <path class="btn-icon" d="M24 23h3v13h-3V23zm1.5-5.5c1 0 1.8.8 1.8 1.8s-.8 1.8-1.8 1.8-1.8-.8-1.8-1.8.8-1.8 1.8-1.8zM29 23h2.8v1.8h.1c.4-.7 1.4-1.8 3.1-1.8 3.3 0 3.9 2.2 3.9 5V36h-3v-6.2c0-1.5 0-3.4-2.1-3.4s-2.4 1.6-2.4 3.3V36H29V23z" fill="#FFF"/>
      <text x="68" y="32" class="btn-text">LinkedIn</text>
      <text x="68" y="48" class="btn-subtext">shubhrat-chaursiya</text>
    </g>
  </a>

  <!-- BUTTON 2: Portfolio -->
  <a href="https://shubhratchaursiya.netlify.app" target="_blank">
    <g class="btn-group" transform="translate(420, 105)">
      <rect width="340" height="65" class="btn-base" rx="12"/>
      <!-- Portfolio Icon Container -->
      <rect x="12" y="12" width="41" height="41" rx="8" fill="#00F2FE" />
      <path class="btn-icon" d="M32.5 17h-21C10.1 17 9 18.1 9 19.5v13c0 1.4 1.1 2.5 2.5 2.5h21c1.4 0 2.5-1.1 2.5-2.5v-13c0-1.4-1.1-2.5-2.5-2.5zm-10.5 3c1.4 0 2.5 1.1 2.5 2.5S23.4 25 22 25s-2.5-1.1-2.5-2.5 1.1-2.5 2.5-2.5zm7 11.5h-14v-1c0-2.3 4.7-3.5 7-3.5s7 1.2 7 3.5v1z" fill="#080E18"/>
      <text x="68" y="32" class="btn-text">Personal Portfolio</text>
      <text x="68" y="48" class="btn-subtext">shubhratchaursiya.netlify.app</text>
    </g>
  </a>

  <!-- BUTTON 3: Email -->
  <a href="mailto:shubhratchaursiya2005@gmail.com">
    <g class="btn-group" transform="translate(40, 185)">
      <rect width="340" height="65" class="btn-base" rx="12"/>
      <!-- Email Icon Container -->
      <rect x="12" y="12" width="41" height="41" rx="8" fill="#EA4335" />
      <path class="btn-icon" d="M18 21l8 5 8-5v-2l-8 5-8-5v2zm16-4H16c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V19c0-1.1-.9-2-2-2zm0 16H16V21l8 5 8-5v12z" fill="#FFF"/>
      <text x="68" y="32" class="btn-text">Email Me</text>
      <text x="68" y="48" class="btn-subtext">shubhratchaursiya2005@gmail.com</text>
    </g>
  </a>

  <!-- BUTTON 4: Twitter / X -->
  <a href="https://x.com/shubhrat_0829" target="_blank">
    <g class="btn-group" transform="translate(420, 185)">
      <rect width="340" height="65" class="btn-base" rx="12"/>
      <!-- Twitter Icon Container -->
      <rect x="12" y="12" width="41" height="41" rx="8" fill="#15202B" stroke="#334155" />
      <path class="btn-icon" d="M18.2 19h3.3l5.3 7.6 5.8-7.6h3.4l-7.7 9.8 8.2 11.2h-3.3l-5.8-8.1-6.3 8.1h-3.4l8.2-10.3L18.2 19zm4.5 1.8h-1.6l10.3 14.6h1.6L22.7 20.8z" fill="#FFF"/>
      <text x="68" y="32" class="btn-text">Twitter / X</text>
      <text x="68" y="48" class="btn-subtext">@shubhrat_0829</text>
    </g>
  </a>

  <!-- BUTTON 5: Instagram -->
  <a href="https://www.instagram.com" target="_blank">
    <g class="btn-group" transform="translate(230, 265)">
      <rect width="340" height="65" class="btn-base" rx="12"/>
      <!-- Instagram Icon Container -->
      <rect x="12" y="12" width="41" height="41" rx="8" fill="#E1306C" />
      <path class="btn-icon" d="M26 19c-3.9 0-7 3.1-7 7s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7zm0 11.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm8.2-11.9c-.9 0-1.6.7-1.6 1.6s.7 1.6 1.6 1.6 1.6-.7 1.6-1.6-.7-1.6-1.6-1.6zM26 15c3.6 0 4 0 5.4.1 3.2.1 4.5 1.5 4.7 4.7.1 1.4.1 1.8.1 5.4s0 4-.1 5.4c-.1 3.2-1.5 4.5-4.7 4.7-1.4.1-1.8.1-5.4.1s-4 0-5.4-.1c-3.2-.1-4.5-1.5-4.7-4.7-.1-1.4-.1-1.8-.1-5.4s0-4 .1-5.4c.1-3.2 1.5-4.5 4.7-4.7 1.4-.1 1.8-.1 5.4-.1z" fill="#FFF"/>
      <text x="68" y="32" class="btn-text">Instagram</text>
      <text x="68" y="48" class="btn-subtext">Connect on Instagram</text>
    </g>
  </a>
</svg>
