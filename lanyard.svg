<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="250" height="500">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" /><stop offset="50%" stop-color="#888888" /><stop offset="100%" stop-color="#333333" />
    </linearGradient>
    <linearGradient id="cardEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" /><stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9" /><stop offset="100%" stop-color="#020617" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/><stop offset="45%" stop-color="#ffffff" stop-opacity="0.1"/><stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/><stop offset="55%" stop-color="#ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="avatarClip"><circle cx="100" cy="80" r="50" /></clipPath>
    <clipPath id="cardClip"><rect width="200" height="320" rx="15" /></clipPath>

    <style>
      .swing { transform-origin: 150px 0px; animation: swing 3.5s ease-in-out infinite alternate; }
      .name-text { fill: #ffffff; font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 900; text-anchor: middle; letter-spacing: 0.5px;}
      .handle-text { fill: #00f2fe; font-family: monospace; font-size: 13px; text-anchor: middle; }
      .role-text { fill: #020617; font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: bold; text-anchor: middle; letter-spacing: 2px;}
      @keyframes swing { 0% { transform: rotate(5deg); } 100% { transform: rotate(-5deg); } }
    </style>
  </defs>

  <g class="swing">
    <path d="M 150 -20 L 138 200 L 162 200 Z" fill="#00f2fe" />
    
    <rect x="135" y="190" width="30" height="20" fill="url(#metalGrad)" rx="3" />
    <path d="M 140 195 L 160 195" stroke="#ffffff" stroke-width="1" opacity="0.5" />
    <circle cx="150" cy="222" r="12" fill="none" stroke="url(#metalGrad)" stroke-width="5" />
    
    <g transform="translate(50, 235)" filter="url(#dropShadow)">
      <rect width="200" height="320" fill="url(#glassBg)" stroke="url(#cardEdge)" stroke-width="2" rx="15" />
      <path d="M 10 2 L 190 2" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-linecap="round" />

      <circle cx="100" cy="80" r="53" fill="none" stroke="#34d399" stroke-width="4" filter="url(#glow)" />
      
      <circle cx="100" cy="80" r="50" fill="#0f172a" />
      <text x="100" y="85" fill="#34d399" font-size="12" font-family="sans-serif" font-weight="bold" text-anchor="middle">AVATAR</text>

      <!-- <image href="data:image/png;base64,PASTE_YOUR_BASE64_HERE" width="100" height="100" x="50" y="30" clip-path="url(#avatarClip)" /> -->

      <text x="100" y="170" class="name-text">Shubhrat Chaursiya</text>
      <text x="100" y="195" class="handle-text">@shubhratchaursiya</text>
      
      <rect x="55" y="215" width="90" height="22" fill="#34d399" rx="11" />
      <text x="100" y="230" class="role-text">DEVELOPER</text>
      
      <g stroke="#00f2fe" stroke-width="2" filter="url(#glow)">
        <path d="M 35 270 v25 M 40 270 v25 M 45 270 v25 M 55 270 v25 M 60 270 v25 M 75 270 v25 M 80 270 v25 M 90 270 v25 M 105 270 v25 M 115 270 v25 M 130 270 v25 M 145 270 v25 M 150 270 v25 M 160 270 v25" />
      </g>
      <g stroke="#ffffff" stroke-width="1">
        <path d="M 35 270 v25 M 40 270 v25 M 45 270 v25 M 55 270 v25 M 60 270 v25 M 75 270 v25 M 80 270 v25 M 90 270 v25 M 105 270 v25 M 115 270 v25 M 130 270 v25 M 145 270 v25 M 150 270 v25 M 160 270 v25" />
      </g>

      <rect width="200" height="320" fill="url(#shineGrad)" clip-path="url(#cardClip)">
        <animate attributeName="x" values="-300; 300; -300" dur="6s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
