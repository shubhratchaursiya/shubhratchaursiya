<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 282" width="420" height="282" role="img" aria-label="DevOps Tech Stack">
<defs>
<style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>

<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%">
<animate attributeName="stop-color"
values="#ff7eb6;#c084fc;#ff7eb6"
dur="6s"
repeatCount="indefinite"/>
</stop>
<stop offset="100%">
<animate attributeName="stop-color"
values="#c084fc;#ff7eb6;#c084fc"
dur="6s"
repeatCount="indefinite"/>
</stop>
</linearGradient>

<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#fff" stop-opacity="0"/>
<stop offset="50%" stop-color="#fff" stop-opacity=".08"/>
<stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>

<clipPath id="cardc">
<rect x="1" y="1" width="418" height="280" rx="14"/>
</clipPath>

<clipPath id="stackc">
<rect x="20" y="58" width="0" height="11" rx="5.5">
<animate attributeName="width"
from="0"
to="380"
dur="1.4s"
begin=".4s"
fill="freeze"/>
</rect>
</clipPath>

</defs>

<rect x="1" y="1"
width="418"
height="280"
rx="14"
fill="#170e28"
stroke="url(#tg)"
stroke-width="1.5"/>

<text x="20"
y="34"
font-size="16"
font-weight="bold"
fill="url(#tg)">
⚙ DevOps Tech Stack
</text>

<!-- Top Stack -->
<g clip-path="url(#stackc)">
<rect x="20" y="58" width="114" height="11" fill="#2496ED"/>
<rect x="134" y="58" width="95" height="11" fill="#326CE5"/>
<rect x="229" y="58" width="76" height="11" fill="#FF9900"/>
<rect x="305" y="58" width="57" height="11" fill="#7B42BC"/>
<rect x="362" y="58" width="38" height="11" fill="#D33833"/>
</g>

<!-- Docker -->
<g class="row" style="animation-delay:.9s">
<circle cx="26" cy="91" r="5" fill="#2496ED"/>
<text x="40" y="96" font-size="13" fill="#e6edf3" font-weight="bold">Docker</text>
<text x="396" y="96" text-anchor="end" font-size="13" fill="#2496ED" font-weight="bold">30%</text>
<rect x="40" y="104" width="268" height="9" rx="4.5" fill="#241740"/>
<rect x="40" y="104" width="80.4" height="9" rx="4.5" fill="#2496ED">
<animate attributeName="width" from="0" to="80.4" dur="1.1s" begin="1.05s" fill="freeze"/>
</rect>
</g>

<!-- Kubernetes -->
<g class="row" style="animation-delay:1.25s">
<circle cx="26" cy="133" r="5" fill="#326CE5"/>
<text x="40" y="138" font-size="13" fill="#e6edf3" font-weight="bold">Kubernetes</text>
<text x="396" y="138" text-anchor="end" font-size="13" fill="#326CE5" font-weight="bold">25%</text>
<rect x="40" y="146" width="268" height="9" rx="4.5" fill="#241740"/>
<rect x="40" y="146" width="67" height="9" rx="4.5" fill="#326CE5">
<animate attributeName="width" from="0" to="67" dur="1.1s" begin="1.4s" fill="freeze"/>
</rect>
</g>

<!-- AWS -->
<g class="row" style="animation-delay:1.6s">
<circle cx="26" cy="175" r="5" fill="#FF9900"/>
<text x="40" y="180" font-size="13" fill="#e6edf3" font-weight="bold">AWS</text>
<text x="396" y="180" text-anchor="end" font-size="13" fill="#FF9900" font-weight="bold">20%</text>
<rect x="40" y="188" width="268" height="9" rx="4.5" fill="#241740"/>
<rect x="40" y="188" width="53.6" height="9" rx="4.5" fill="#FF9900">
<animate attributeName="width" from="0" to="53.6" dur="1.1s" begin="1.75s" fill="freeze"/>
</rect>
</g>

<!-- Terraform -->
<g class="row" style="animation-delay:1.95s">
<circle cx="26" cy="217" r="5" fill="#7B42BC"/>
<text x="40" y="222" font-size="13" fill="#e6edf3" font-weight="bold">Terraform</text>
<text x="396" y="222" text-anchor="end" font-size="13" fill="#7B42BC" font-weight="bold">15%</text>
<rect x="40" y="230" width="268" height="9" rx="4.5" fill="#241740"/>
<rect x="40" y="230" width="40.2" height="9" rx="4.5" fill="#7B42BC">
<animate attributeName="width" from="0" to="40.2" dur="1.1s" begin="2.1s" fill="freeze"/>
</rect>
</g>

<!-- Shine -->
<g clip-path="url(#cardc)">
<rect class="sh"
x="0"
y="0"
width="100"
height="282"
fill="url(#shg)"
transform="skewX(-15)"/>
</g>

</svg>
